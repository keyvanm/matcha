services:
  gitea:
    image: gitea/gitea:1.25
    container_name: matcha-gitea
    network_mode: service:tailscale
    depends_on:
      - tailscale
    env_file: .env
    environment:
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__database__DB_TYPE=sqlite3
    volumes:
      - ${HOME}/.local/share/matcha/gitea:/data:Z,U
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:v1.94
    container_name: matcha-tailscale
    hostname: matcha
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/tailscale-serve.json
      - TS_USERSPACE=false
    volumes:
      - ${HOME}/.local/share/matcha/tailscale:/var/lib/tailscale:Z
      - ./tailscale/config:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    security_opt:
      - label:disable
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
